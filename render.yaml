services:
  - type: web
    name: learnit-api
    runtime: node
    buildCommand: npm install && npm run build 2>/dev/null || npm install
    startCommand: node --import tsx/esm server.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: NVIDIA_API_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false
